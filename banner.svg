<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0408"/>
      <stop offset="0.5" stop-color="#1a0608"/>
      <stop offset="1" stop-color="#2c0b10"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE27A"/>
      <stop offset="0.35" stop-color="#FFB733"/>
      <stop offset="0.65" stop-color="#C98311"/>
      <stop offset="1" stop-color="#6B3A04"/>
    </linearGradient>
    <linearGradient id="goldStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF5B0"/>
      <stop offset="1" stop-color="#8B4513"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="0" result="off"/>
      <feFlood flood-color="#EB4747" flood-opacity="0.55"/>
      <feComposite in2="off" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5"/>
      <feFlood flood-color="#FFB733" flood-opacity="0.4"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#EB4747" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background layers -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- red diagonal slashes like Tekken title screens -->
  <polygon points="0,0 260,0 140,340 0,340" fill="#8B0000" fill-opacity="0.38"/>
  <polygon points="40,0 110,0 -20,340 -100,340" fill="#EB4747" fill-opacity="0.55"/>
  <polygon points="940,0 1200,0 1200,340 1060,340" fill="#8B0000" fill-opacity="0.38"/>
  <polygon points="1090,0 1160,0 1300,340 1220,340" fill="#EB4747" fill-opacity="0.55"/>

  <!-- center horizontal scan line -->
  <line x1="80" y1="175" x2="1120" y2="175" stroke="#EB4747" stroke-opacity="0.18" stroke-width="1"/>

  <!-- P1 / P2 tournament markers -->
  <text x="72" y="62" font-family="'Arial Black', Impact, sans-serif" font-size="22" font-weight="900" fill="#FFD700" letter-spacing="3">P1</text>
  <text x="1128" y="62" font-family="'Arial Black', Impact, sans-serif" font-size="22" font-weight="900" fill="#FFD700" text-anchor="end" letter-spacing="3">READY</text>

  <!-- small top label -->
  <text x="600" y="62" font-family="'Courier New', monospace" font-size="14" fill="#EB4747" text-anchor="middle" letter-spacing="8">THE KING OF IRON FIST TOURNAMENT</text>

  <!-- main title SAI NARNE, gold metallic -->
  <text x="600" y="180" font-family="'Arial Black', Impact, sans-serif" font-size="108" font-weight="900" text-anchor="middle"
        fill="url(#gold)" stroke="url(#goldStroke)" stroke-width="1.5" letter-spacing="8" filter="url(#goldGlow)">SAI NARNE</text>

  <!-- kanji accent: 鉄拳 (Iron Fist) + 3 -->
  <text x="600" y="230" font-family="'Yu Mincho', 'MS Mincho', serif" font-size="26" text-anchor="middle"
        fill="#FFD700" letter-spacing="12" filter="url(#goldGlow)">鉄 拳 &#x2162;</text>

  <!-- Tekken-style red subtitle -->
  <text x="600" y="275" font-family="'Courier New', monospace" font-size="20" font-weight="700" text-anchor="middle"
        fill="#EB4747" letter-spacing="10" filter="url(#glow)">ML SYSTEMS EDITION</text>

  <!-- bottom READY / FIGHT marker -->
  <text x="600" y="312" font-family="'Courier New', monospace" font-size="14" text-anchor="middle" fill="#FFD700" letter-spacing="16" fill-opacity="0.85">ROUND 1 ⋅ FIGHT!</text>

  <!-- corner brackets like arcade ui -->
  <path d="M20,20 L60,20 M20,20 L20,60" stroke="#FFD700" stroke-width="2" fill="none"/>
  <path d="M1180,20 L1140,20 M1180,20 L1180,60" stroke="#FFD700" stroke-width="2" fill="none"/>
  <path d="M20,320 L60,320 M20,320 L20,280" stroke="#FFD700" stroke-width="2" fill="none"/>
  <path d="M1180,320 L1140,320 M1180,320 L1180,280" stroke="#FFD700" stroke-width="2" fill="none"/>
</svg>
